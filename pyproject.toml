# Formatting + linting config for a Django REST Framework project.
# Ruff handles both: `ruff check` = eslint, `ruff format` = prettier.

[tool.ruff]
line-length = 100
target-version = "py314"          # set to your Python version
extend-exclude = ["migrations"]   # don't lint auto-generated migrations

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes (unused imports/vars, undefined names)
    "I",    # isort (import sorting)
    "N",    # pep8-naming
    "UP",   # pyupgrade (modernize syntax)
    "B",    # flake8-bugbear (likely bugs)
    "C4",   # flake8-comprehensions
    "DJ",   # flake8-django (Django-specific rules)
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
]
ignore = [
    "E501",  # line length handled by the formatter
]

[tool.ruff.lint.per-file-ignores]
"settings*.py" = ["F403", "F405"]  # allow `from base import *` in settings
"__init__.py"  = ["F401"]           # allow unused re-exports

[tool.ruff.lint.isort]
known-first-party = ["project_management"]  # <-- change to your package name

[tool.ruff.format]
quote-style = "double"
indent-style = "space"